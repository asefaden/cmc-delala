version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: cmc-delala-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
  healthcheck:
      # 1. Swapped localhost for 127.0.0.1 
      # 2. If wget fails, fallback to a lightweight node command check
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/health || node -e \"require('http').get('http://127.0.0.1:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 10s       # Reduced from 30s so Docker catches the app's health faster
      timeout: 5s
      retries: 3
      start_period: 20s   # Increased slightly to give your database initialization plenty of room to finish

# NOTE: The external database (db.aletcloud.com) is configured via .env variables.
# The local MariaDB service has been removed since it is not used.
