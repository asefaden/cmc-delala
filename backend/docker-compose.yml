version: '3.8'

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-delala}
      MYSQL_USER: ${DB_USER:-admin_delala}
      MYSQL_PASSWORD: ${DB_PASSWORD:-your_password_here}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-delala}
      - DB_USER=${DB_USER:-admin_delala}
      - DB_PASSWORD=${DB_PASSWORD:-your_password_here}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-*}
      - API_BASE_URL=${API_BASE_URL:-*}
    depends_on:
      - db

volumes:
  db_data: