apiVersion: v1
kind: Secret
metadata:
  name: cmc-delal-secrets
  labels:
    app: cmc-delal-backend
type: Opaque
stringData:
  # Generate with: openssl rand -hex 64
  jwt-secret: "REPLACE_WITH_GENERATED_JWT_SECRET"
  # Database configuration
  db-host: "REPLACE_WITH_DB_HOST"
  db-name: "delala"
  db-user: "REPLACE_WITH_DB_USER"
  db-password: "REPLACE_WITH_DB_PASSWORD"