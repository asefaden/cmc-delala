apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmc-delal-backend
  labels:
    app: cmc-delal-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cmc-delal-backend
  template:
    metadata:
      labels:
        app: cmc-delal-backend
    spec:
      containers:
        - name: cmc-delal-backend
          # Replace with your actual image registry path
          image: ghcr.io/asefaden/cmc-delala:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cmc-delal-secrets
                  key: jwt-secret
            - name: FRONTEND_URL
              value: "*"
            - name: API_BASE_URL
              value: ""
            # Database configuration from secrets
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: cmc-delal-secrets
                  key: db-host
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: cmc-delal-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cmc-delal-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cmc-delal-secrets
                  key: db-password
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: uploads
              mountPath: /workspace/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: cmc-delal-uploads
      restartPolicy: Always